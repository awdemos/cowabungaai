apiVersion: batch/v1
kind: Job
metadata:
  name: {{ include "chart.fullname" . }}-migrations-{{ .Values.migration.image.tag | default .Chart.AppVersion }}
  namespace: {{ .Release.Namespace | default "cowabungaai" }}
  labels:
    {{- include "chart.labels" . | nindent 4 }}
spec:
  template:
    metadata:
      labels:
        {{- include "chart.selectorLabels" . | nindent 8 }}
    spec:
      securityContext:
        {{- toYaml .Values.podSecurityContext | nindent 8 }}
      containers:
        - name: turso-migrations
          image: "{{ .Values.migration.image.repository }}:{{ .Values.migration.image.tag | default .Chart.AppVersion }}"
          {{- with .Values.migration.env }}
          env:
            {{- toYaml . | nindent 12 }}
          {{- end }}
          command: ["/bin/sh"]
          args:
            - -c
            - >-
              echo "Running Turso database migrations for UI..." &&
              echo "UI migrations are handled by the API migration job." &&
              echo "Skipping UI-specific migrations."
          securityContext:
            {{- toYaml .Values.migration.securityContext | nindent 12 }}
      restartPolicy: Never
  backoffLimit: 4
