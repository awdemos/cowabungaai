# yaml-language-server: $schema=https://raw.githubusercontent.com/uds-cli/uds-cli/v0.16.0/zarf.schema.json

kind: ZarfPackageConfig
metadata:
  description: "CowabungaAI API"
  name: cowabunga-api
  version: "###ZARF_PKG_TMPL_IMAGE_VERSION###"

constants:
  - name: IMAGE_VERSION
    value: "###ZARF_PKG_TMPL_IMAGE_VERSION###"

variables:
  - name: EXPOSE_API
    default: "true"
    description: "Flag to expose the OpenAPI schema for debugging."
  - name: DEFAULT_EMBEDDINGS_MODEL
    default: "text-embeddings"
  - name: DEV
    default: "false"
    description: "Flag to enable development endpoints."

components:
  - name: cowabunga-api
    description: "A Python API that shadows the OpenAI API specification"
    only:
      flavor: upstream
    required: true
    import:
      path: common
    charts:
      - name: cowabunga
        namespace: cowabungaai
        valuesFiles:
          - "values/upstream-values.yaml"
    images:
      - "ghcr.io/defenseunicorns/cowabungaai/cowabunga-api:###ZARF_PKG_TMPL_IMAGE_VERSION###"
      - "ghcr.io/defenseunicorns/cowabungaai/api-migrations:###ZARF_PKG_TMPL_IMAGE_VERSION###"
      - "kiwigrid/k8s-sidecar:1.23.3"

  - name: cowabunga-api
    only:
      flavor: registry1
    required: true
    import:
      path: common
    charts:
      - name: cowabunga
        namespace: cowabungaai
        valuesFiles:
          - "values/registry1-values.yaml"
    images:
      - "registry1.dso.mil/ironbank/opensource/defenseunicorns/cowabungaai/api:v###ZARF_PKG_TMPL_IMAGE_VERSION###"
      # TODO: replace with Ironbank image once hardened: registry1.dso.mil/ironbank/opensource/defenseunicorns/cowabungaai/api/migrations
      - "ghcr.io/defenseunicorns/cowabungaai/api-migrations:###ZARF_PKG_TMPL_IMAGE_VERSION###"
      - "registry1.dso.mil/ironbank/kiwigrid/k8s-sidecar:1.23.3"
