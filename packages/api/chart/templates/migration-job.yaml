apiVersion: batch/v1
kind: Job
metadata:
  name: {{ include "chart.fullname" . }}-migrations-{{ .Values.api.migration.image.tag | default .Chart.AppVersion }}
  namespace: {{ .Release.Namespace | default "cowabungaai" }}
  labels:
    {{- include "chart.labels" . | nindent 4 }}
spec:
  template:
    metadata:
      labels:
        {{- include "chart.selectorLabels" . | nindent 8 }}
    spec:
      securityContext:
        {{- toYaml .Values.podSecurityContext | nindent 8 }}
      containers:
        - name: turso-migrations
          image: "{{ .Values.api.migration.image.repository }}:{{ .Values.api.migration.image.tag | default .Chart.AppVersion }}"
          {{- with .Values.api.migration.env }}
          env:
            {{- toYaml . | nindent 12 }}
          {{- end }}
          command: ["/bin/sh"]
          args:
            - -c
            - >-
              echo "Running Turso database migrations..." &&
              python -m cowabunga_api.migrations run --url "$TURSO_URL" --token "$TURSO_AUTH_TOKEN" --db-path "$TURSO_DATABASE_PATH"
          securityContext:
            {{- toYaml .Values.api.migration.securityContext | nindent 12 }}
      restartPolicy: Never
  backoffLimit: 4
