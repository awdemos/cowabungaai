api:
  expose: true

  image:
    repository: "ghcr.io/defenseunicorns/cowabungaai/cowabunga-api"
    # x-release-please-start-version
    tag: 0.14.0
    # x-release-please-end
    imagePullPolicy: Always

  securityContext:
    runAsUser: 65532
    runAsGroup: 65532
    runAsNonRoot: true
    capabilities:
      drop:
        - ALL

  env:
    - name: COWABUNGA_LOG_LEVEL
      value: "INFO"
    - name: COWABUNGA_CONFIG_PATH
      value: /config/
    - name: COWABUNGA_CONFIG_FILENAME
      value: "*.toml"
    - name: DEFAULT_EMBEDDINGS_MODEL
      value: "text-embeddings"
    - name: DEV
      value: "false"
    - name: PORT
      value: "8080"
    - name: TURSO_URL
      value: "http://turso.cowabungaai.svc.cluster.local:8080"
    - name: TURSO_AUTH_TOKEN
      valueFrom:
        secretKeyRef:
          name: turso-auth
          key: token
          optional: true

  service:
    port: 8080

  serviceAccount:
    name: "cowabunga-api"
    create: true

  migration:
    image:
      repository: "ghcr.io/defenseunicorns/cowabungaai/api-migrations"
      # x-release-please-start-version
      tag: 0.14.0
      # x-release-please-end
      imagePullPolicy: Always

    securityContext:
      runAsUser: 65532
      runAsGroup: 65532

    env:
      - name: TURSO_URL
        value: "http://turso.cowabungaai.svc.cluster.local:8080"
      - name: TURSO_AUTH_TOKEN
        valueFrom:
          secretKeyRef:
            name: turso-auth
            key: token
      - name: TURSO_DATABASE_PATH
        value: "/data/cowabunga.db"

kiwigrid:
  image:
    repository: "kiwigrid/k8s-sidecar"
    tag: "1.23.3"
    imagePullPolicy: Always

  securityContext:
    runAsUser: 65532
    runAsGroup: 65532
    runAsNonRoot: true
    capabilities:
      drop:
        - ALL

  env:
    - name: LABEL
      value: "cowabungaai"
    - name: FOLDER
      value: /config/
    - name: RESOURCE
      value: both
    - name: UNIQUE_FILENAMES
      value: "true"
    - name: NAMESPACE
      value: cowabungaai

podSecurityContext:
  runAsNonRoot: true
  fsGroup: 65532

replicaCount: 1

podAnnotations: {}

nodeSelector: {}

tolerations: []

affinity: {}

strategy:
  rollingUpdate:
    maxUnavailable: 0
  type: RollingUpdate
